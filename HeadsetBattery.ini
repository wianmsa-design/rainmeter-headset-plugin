[Rainmeter]
Update=5000
AccurateText=1
DynamicWindowSize=1
BackgroundMode=2
SolidColor=20,20,20,200
Corner=6

[Variables]
HeadsetControlPath=C:\Tools\HeadsetControl\headsetcontrol.exe
UpdateInterval=300

[MeasureBattery]
Measure=Plugin
Plugin=HeadsetBatteryPlugin
HeadsetControlPath=#HeadsetControlPath#
UpdateInterval=#UpdateInterval#

[MeterBackground]
Meter=Shape
Shape=Rectangle 0,0,160,52 | Fill Color 20,20,20,200 | StrokeWidth 0 | Corner 6

[MeterLabel]
Meter=String
MeasureName=MeasureBattery
X=10
Y=8
W=140
H=20
FontColor=200,200,200,255
FontSize=11
FontFace=Segoe UI
AntiAlias=1
DynamicVariables=1
Text=🎧 [MeasureBattery]%

[MeterBar]
Meter=Bar
MeasureName=MeasureBattery
X=10
Y=32
W=140
H=8
BarColor=80,200,120,255
BarOrientation=Horizontal
